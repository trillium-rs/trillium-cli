# Injected into dist's `build-local-artifacts` jobs via the
# `github-build-setup` config key (path is relative to .github/workflows/).
# Mirrors the prerequisites our CI (ci.yaml) needs to build the shipped binary.

# aws-lc-rs (pulled in by the rustls + h3 features) needs cmake on every platform
# and NASM on Windows.
- name: Install cmake (aws-lc-rs)
  uses: lukka/get-cmake@v4.3.3
- name: Install NASM (aws-lc-rs on Windows)
  if: runner.os == 'Windows'
  uses: ilammy/setup-nasm@v1
# arm64 macOS links with lld to dodge the ld-prime symbol-length assertion
# (x86_64 macOS links fine with Apple ld, so this is scoped to ARM64 only).
#
# dist sets RUSTFLAGS in-process on the cargo build (build/cargo.rs), which makes
# Cargo IGNORE .cargo/config.toml's [target.*] rustflags entirely — so the flag
# MUST go through RUSTFLAGS here. dist reads any pre-existing RUSTFLAGS from the
# env and preserves it, so exporting it via $GITHUB_ENV is the supported path.
- name: Use lld for arm64 macOS linking
  if: runner.os == 'macOS' && runner.arch == 'ARM64'
  run: |
    brew install lld
    echo "$(brew --prefix lld)/bin" >> "$GITHUB_PATH"
    echo "RUSTFLAGS=-Clink-arg=-fuse-ld=ld64.lld" >> "$GITHUB_ENV"
